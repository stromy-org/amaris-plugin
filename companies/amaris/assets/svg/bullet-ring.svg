<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="Outline ring numbered-list bullet">
  <!--
    Circle ring bullet — outline ring for numbered lists; the navy numeral is
    composited by the consumer (HTML overlays a <span>; the DOCX path uses text
    numerals). Ring stroke is navy #272674 by default; override via currentColor
    when a light-on-dark variant is needed.
  -->
  <circle cx="20" cy="20" r="16" fill="none" stroke="#272674" stroke-width="2"/>
</svg>
